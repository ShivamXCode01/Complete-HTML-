<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Tag</title>
</head>
<body>
    <h2>Form Tags </h2>
    <fieldset>
        <legend>FORM</legend>
        <form>
        <label for="Name">Enter Your Name : </label>
        <input type="text" name="name" id="Name" placeholder="xyz">
        <br>
        <br>
        <label for="Age">Enter Your Age : </label>
        <input type="number" name="age" id="Age" placeholder="32">
        <br>
        <br>
        <label for="DOB"> Enter Date of Birth : </label>
        <input type="date" name="dob" id="DOB">
        <br>
        <br>
        <label for="Email">Enter Your Email Address : </label>
        <input type="email" name="email" id="Email" placeholder="xyz@gmail.com">
        <br>
        <br>
        <label for="Gender">Enter Your Gender : </label>
        <label for="g">MALE</label>
        <input type="radio" name="gender" id="g">
        <label for="g">FEMALE</label>
        <input type="radio" name="gender" id="g">
        <label for="g">Transgender</label>
        <input type="radio" name="gender" id="g">
        
        <br>
        <br>
        <label for="Choice">Enter Your Choice : </label>
        <label for="stream">AI</label>
        <input type="checkbox" name="course" id="stream">
        <label for="stream">ML</label>
        <input type="checkbox" name="course" id="stream">
        <label for="stream">DSA</label>
        <input type="checkbox" name="course" id="stream">
        <label for="stream">MERN</label>
        <input type="checkbox" name="course" id="stream">

        <br>
        <br>
        <label for="Time">Enter Current Time : </label>
        <input type="time" name="time" id="Time">

        <br>
        <br>

        <label for="File">Select Your File : </label>
        <input type="file" name="file" id="File">

        <br>
        <br>

        <label for="color">Enter Your Color : </label>
        <input type="color" name="Color" id="color">

        <br>
        <br>
        
        <label for="password">Enter your Password : </label>
        <input type="text" name="Password" id="password">

        <br>
        <br>
        <label for="Marks">Select Your level : </label>
        <input type="range" name="marks" id="Marks"  min="0" max="100" value="50">
        <br>
        <br>
            <label for="year">Select Your Current Year : </label>
            <select name="Year" id="year">
                <option value="">--Select Option--</option>
                <option value="First">First</option>
                <option value="Second">Second</option>
                <option value="Third">Third</option>
                <option value="Fourth">Fourth</option>

            </select>
        <br>
        <br>
        <input type="reset" value="RESET">
        <input type="submit" value="SUBMIT">
    </form>
</fieldset>
    
</body>
</html>
