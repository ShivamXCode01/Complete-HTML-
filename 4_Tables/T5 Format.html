<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T5 Format</title>
</head>
<body>
    <h2>Table 5 format</h2>
    <table border="2px" bordercolor="black" bgcolor="orange" height="300px" width="400px">
       <tr>
        <td rowspan="3"></td>
        <td colspan="4"></td>
       </tr>
       <tr>
        <td colspan="2"></td>
        <td rowspan="2" colspan="2"></td>
       </tr>
       <tr>
        <td colspan="2"></td>
       </tr>
       <tr>
        <td rowspan="2"></td>
        <td rowspan="2"></td>
        <td rowspan="2"></td>
        <td colspan="2"></td>
       </tr>
       <tr>
        <td colspan="2"></td>
       </tr>
       <tr>
        <td rowspan="3"></td>
        <td colspan="2"></td>
        <td colspan="2" rowspan="1"></td>
       </tr>
       <tr>
        <td colspan="2"></td>
        <td colspan="2" rowspan="2"></td>
       </tr>
       <tr>
        <td colspan="2"></td>
       </tr>
       <tr>
        <td></td>
        <td></td>
        <td></td>
        <td colspan="2"></td>
        
       </tr>

    </table>
</body>
</html>
