<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Tag</title>
</head>
<body>
    <h2>Media Tags</h2>

    <p>Image tag</p>
    <img src="love matrimony.jpg" alt="IMG" height="200px" >

    <p>Video Tag</p>
    <video width="500" controls>
        <source src="133829-758327963.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <p>Audio tag</p>
    <audio controls>
        <source src="mixkit-game-show-suspense-waiting-667.wav" type="audio/mp3">
    </audio>

    <p>Iframe Tag to display another website on our website</p>
    <iframe
        width="560"
        height="315"
        src="https://www.google.com/maps"
        allowfullscreen>
    </iframe>
</body>
</html>
